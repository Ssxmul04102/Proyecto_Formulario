<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMULARIO SENA V1</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <form class="formulario">
            <h1>FORMULARIO SENA V1</h1>
            <h2>GRACIAS POR DEJAR SUS DATOS</h2>
            
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Please enter your name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Please enter your email" required>
            </div>
            
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" placeholder="Please enter your age" min="1" max="120" required>
            </div>
            
            <div class="form-group">
                <label for="option">Choose an option</label>
                <select id="option" name="option" required>
                    <option value="" disabled selected>Select One Option</option>
                    <option value="option1">Option 1</option>
                    <option value="option2">Option 2</option>
                    <option value="option3">Option 3</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Do you plan to buy a new car in the next 5 years?</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="yes" name="car_plan" value="yes" required>
                        <label for="yes">Yes</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="no" name="car_plan" value="no">
                        <label for="no">No</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="maybe" name="car_plan" value="maybe">
                        <label for="maybe">Maybe</label>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="brand">What is your favorite car brand?</label>
                <select id="brand" name="brand" required>
                    <option value="" disabled selected>Select One Option</option>
                    <option value="toyota">Toyota</option>
                    <option value="ford">Ford</option>
                    <option value="honda">Honda</option>
                    <option value="bmw">BMW</option>
                    <option value="mercedes">Mercedes</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>What type of means of transportation do you own?</label>
                <div class="checkbox-group">
                    <div class="checkbox-option">
                        <input type="checkbox" id="car" name="transportation" value="car">
                        <label for="car">Car</label>
                    </div>
                    <div class="checkbox-option">
                        <input type="checkbox" id="boat" name="transportation" value="boat">
                        <label for="boat">Boat</label>
                    </div>
                    <div class="checkbox-option">
                        <input type="checkbox" id="bicycle" name="transportation" value="bicycle">
                        <label for="bicycle">Bicycle</label>
                    </div>
                    <div class="checkbox-option">
                        <input type="checkbox" id="motorcycle" name="transportation" value="motorcycle">
                        <label for="motorcycle">Motorcycle</label>
                    </div>
                    <div class="checkbox-option">
                        <input type="checkbox" id="plane" name="transportation" value="plane">
                        <label for="plane">Plane</label>
                    </div>
                    <div class="checkbox-option">
                        <input type="checkbox" id="bike" name="transportation" value="bike">
                        <label for="bike">Bike</label>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="comments">Any comments suggestions?</label>
                <textarea id="comments" name="comments" placeholder="Please enter your comments"></textarea>
            </div>
            
            <button type="submit" class="submit-btn">Submit</button>
        </form>
    </div>
</body>
</html>
